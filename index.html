const QB={"Hardware / IoT / Embedded Systems":{q:["Walk me through end-to-end data flow — sensor to decision. What happens at each layer?","What protocol and why over LoRa, Zigbee, or BLE?","How does it behave when network drops? Show the offline/edge logic.","What is power consumption and realistic battery life in deployment?","How do you handle sensor calibration drift?","Security model — auth, encryption, OTA updates?","1,000 unit deployment cost — walk me through your BOM."],r:["Demo only on local WiFi — no field deployment data","Cannot explain what happens when a node loses connectivity","Power tested on bench only","No security model — firmware unencrypted"],p:"Push on real-world failure modes — sensor drift, connectivity loss, power in field conditions."},"Robotics & Drones / UAVs":{q:["Demonstrate a failure scenario — noisy sensor input?","How does your autonomy stack handle edge cases not in training?","Obstacle avoidance latency detect-to-react? Benchmarked how?","Walk through safety kill-switch and fail-safe architecture.","Regulatory compliance — DGCA approvals, geofencing?","Localization accuracy indoors vs outdoors without GPS?","Onboard vs offboard compute — latency implications?"],r:["No fail-safe — safety assumed not engineered","Only tested in lab, no real-world trials","Unaware of regulatory requirements","Autonomy breaks with simple unexpected obstacle"],p:"Test safety — simulate a sensor failure live."},"AI / ML / Computer Vision / NLP":{q:["Accuracy on a held-out test set it has NEVER seen?","How did you handle class imbalance, data leakage, overfitting?","Performance on adversarial or out-of-distribution inputs?","Full ML pipeline — collection, labeling, training, validation, deployment?","Dataset size and real-world diversity assurance?","Inference latency and compute cost at production scale?","How do you detect and handle model drift post-deployment?"],r:["Accuracy on training data, not a test set","Dataset under 500 samples or not representative","Cannot explain model predictions","No plan for monitoring or retraining"],p:"Ask them to show the model failing — every strong ML project knows where it breaks."},"Sustainable Tech / Green Energy":{q:["Measurable impact — CO₂ saved, energy generated, waste reduced?","Lifecycle cost vs status quo it replaces?","Economic payback period for an end user?","Performance under variable conditions — weather, seasons?","Durability and maintenance cost over 5–10 years?","Life Cycle Assessment conducted or referenced?","First buyer and regulatory pathway?"],r:["Environmental claims with no measurement methodology","Works only under ideal conditions","Economic model ignores total cost of ownership","No LCA — may cost more environmentally than it saves"],p:"Challenge every impact number — ask for methodology behind each metric."},"Agrotech / Waste-to-Wealth / Rural":{q:["Tested with actual farmers? Their feedback?","Works in areas with poor or no internet?","Total adoption cost for a small farmer?","Accounts for local language and literacy levels?","Crop types or waste streams validated beyond demo?","Input-to-output value ratio?","Integration with government schemes or agri supply chains?"],r:["Designed without talking to actual end users","Requires internet/smartphone target users don't have","Cost too high without subsidy","Only tested in one location or season"],p:"Ask when they last spoke to a farmer — field validation separates strong projects from ideas."},"Software / SaaS / Web / Mobile":{q:["Real users beyond your team? Show usage analytics.","Architecture under 10x load — will it hold?","Data privacy and compliance handling?","Customer acquisition cost and churn from beta?","Key user workflow live with data entered NOW.","Authentication and common vulnerability handling?","Monetization model — have users committed to pay?"],r:["No real users — only internal testing","Single server, no redundancy or scaling plan","No privacy policy despite handling user data","Demo uses pre-seeded data — breaks with fresh input"],p:"See it work with data entered live — the gap between demo and reality is where apps fail."},"Open Category / Other Innovation":{q:["Specific problem and who experiences it most?","How did you validate this problem before building?","What alternatives exist and why is yours better?","Single most important technical innovation?","How does it work outside demo — what breaks first?","Path from prototype to deployment in 12 months?","What would you change with 6 more months and ₹5 lakhs?"],r:["Problem statement vague — no measurable pain point","No competitive analysis","Works only under demo conditions","No clear user defined"],p:"Ask when they last spoke to a potential user — real research separates strong projects."}};

const sKey=k=>{_key=k?k.trim():"";};
const pN=(t,k,d=6)=>{const m=t.match(new RegExp(k+"\\s*[:\\-]\\s*(\\d+(?:\\.\\d+)?)","i"));return m?Math.min(10,Math.max(0,parseFloat(m[1]))):d;};
const pS=(t,k,d="")=>{const m=t.match(new RegExp(k+"\\s*[:\\-]\\s*(.+)","i"));return m?m[1].trim():d;};
async function ai(prompt){
  if(!_key)throw new Error("NO_KEY");
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":_key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,messages:[{role:"user",content:prompt}]})});

  if(d.error)throw new Error(d.error.message||"API error");
  const o=(d.content||[]).map(b=>b.text||"").join("").trim();
  if(!o)throw new Error("Empty AI response");
  return o;
}

#f0fdf4">${t.finalScores?t.finalScores[k]||0:"—"}</td></tr>`).join("")}</tbody></table>${t.aiAnalysis?`<div style="background:#eff6ff;border-left:4px solid #2563eb;padding:8px 10px;border-radius:0 6px 6px 0;font-size:11px;color:#1e40af;margin-bottom:8px"><strong>AI:</strong> ${t.aiAnalysis}</div>`:""}</div></div>`).join("");
  const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>HackFusion 2026 Results</title><style>*{box-sizing:border-box}body{font-family:Arial,sans-serif;margin:0;padding:0;background:#fff}@media print{.np{display:none!important}}@page{margin:12mm;size:A4}.pb{position:fixed;top:12px;right:12px;background:#f59e0b;color:#000;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-weight:bold}</style></head><body><button class="pb np" onclick="window.print()">🖨 Save / Print PDF</button><div style="max-width:780px;margin:0 auto;padding:20px"><div style="text-align:center;margin-bottom:24px;padding:20px;background:linear-gradient(135deg,#07090e,#0a0f1e);border-radius:10px;color:#fff"><div style="font-size:9px;letter-spacing:4px;color:#f59e0b;margin-bottom:4px">HACKFUSION 2026 · NATIONAL LEVEL PROJECT EXPO</div><div style="font-size:24px;font-weight:bold">⚖️ HackFusion Judge Pro — Results</div><div style="font-size:10px;color:#64748b;margin-top:6px">${now} · ${teams.length} teams · ${ranked.length} scored · ${teams.filter(t=>t.finalized).length} finalized</div></div><h2 style="font-size:15px;color:#1e293b;border-bottom:3px solid #f59e0b;padding-bottom:5px;margin-bottom:14px">📊 Score Summary</h2><table style="width:100%;border-collapse:collapse;margin-bottom:24px;font-size:11px"><thead><tr style="background:#1e293b;color:#fff"><th style="padding:9px 10px;text-align:left">Rank</th><th style="padding:9px 10px;text-align:left">Team / Project</th><th style="padding:9px 10px;text-align:left">Category</th><th style="padding:9px 10px;text-align:center;color:#f59e0b">Manual</th><th style="padding:9px 10px;text-align:center;color:#93c5fd">AI</th><th style="padding:9px 10px;text-align:center;background:#f59e0b;color:#000">Final</th><th style="padding:9px 10px;text-align:center">Status</th></tr></thead><tbody>${ranked.map((t,i)=>`<tr style="background:${i%2===0?"#f8fafc":"#fff"};border-bottom:1px solid #e2e8f0"><td style="padding:9px 10px;font-size:16px">${medals[i]||"#"+(i+1)}</td><td style="padding:9px 10px;font-weight:bold;color:#0f172a">${t.name}</td><td style="padding:9px 10px;color:#475569;font-size:10px">${t.cat.split("/")[0].trim()}</td><td style="padding:9px 10px;text-align:center;color:#f59e0b;font-weight:bold">${wt(t.manualScores)||"—"}</td><td style="padding:9px 10px;text-align:center;color:#2563eb;font-weight:bold">${t.aiScores?wt(t.aiScores):"—"}</td><td style="padding:9px 10px;text-align:center;font-size:16px;font-weight:bold;color:${i===0?"#f59e0b":i===1?"#94a3b8":i===2?"#b45309":"#0f172a"}">${wt(t.finalScores)}</td><td style="padding:9px 10px;text-align:center"><span style="font-size:9px;padding:2px 7px;border-radius:10px;background:${t.finalized?"#dcfce7":"#fef9c3"};color:${t.finalized?"#16a34a":"#ca8a04"}">${t.finalized?"FINAL":"SCORED"}</span></td></tr>`).join("")}</tbody></table><h2 style="font-size:15px;color:#1e293b;border-bottom:3px solid #f59e0b;padding-bottom:5px;margin-bottom:14px">📋 Detailed Scorecards</h2>${cards||"<p style='color:#94a3b8'>No scored teams yet.</p>"}<div style="text-align:center;margin-top:24px;padding-top:14px;border-top:1px solid #e2e8f0;font-size:10px;color:#94a3b8">Generated by HackFusion Judge Pro · Built with Claude AI · Anthropic</div></div></body></html>`;

function xCSV(teams){
  const ck=["innovation","technical","impact","scalability","presentation"];

function Teams({teams,set,go}){

  const save=()=>{if(!n.trim())return;if(eid){set(t=>t.map(x=>x.id===eid?{...x,name:n.trim(),cat:c,desc:d}:x));sE(null);}else set(t=>[...t,mk(n.trim(),c,d)]);sN("");sD("");sC(CATS[0]);};

    </div>}/>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"8px"}}>
        <div style={{flex:1,minWidth:0}}>

            <span style={{fontWeight:"bold",fontSize:"14px",color:TX}}>{i+1}. {t.name}</span>

            {t.visited&&!t.finalized&&<Pill c={A} ch="VISITED"/>}

        </div>

      </div>
    }/>)}
  </div>;
}

// ── JUDGE ─────────────────────────────────────────────────────────────────────
function Judge({team,upd,back,apiKey}){
  const [sec,sSec]=useState(0);
  const [al,sAL]=useState(false);const [ae,sAE]=useState("");
  const [tl,sTL]=useState(null);const [run,sRun]=useState(false);
  const tmr=useRef(null);
  useEffect(()=>{if(!team.visited)upd({visited:true});},[]);
  useEffect(()=>{
    if(run){tmr.current=setInterval(()=>sTL(p=>{if(p<=1){sRun(false);clearInterval(tmr.current);return 0;}return p-1;}),1000);}
    return()=>clearInterval(tmr.current);
  },[run]);
  const fmt=s=>s===null?"--:--":`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  const tc=tl!==null?(tl<60?RD:tl<120?A:GR):GR;
  const bk=gQB(team.cat);
  const mT=wt(team.manualScores),aiT=team.aiScores?wt(team.aiScores):null,fT=team.finalScores?wt(team.finalScores):null;
  const uM=(k,v)=>upd({manualScores:{...team.manualScores,[k]:v}});
  const uF=(k,v)=>upd({finalScores:{...(team.finalScores||eS()),[k]:v}});
  const getAI=async()=>{
    if(!_key){sAE("No API key — add in Settings ⚙");return;}
    sAE("");sAL(true);
    try{
      const t=await ai(`You are judging HACKFUSION 2026 projects.\nProject: ${team.name}\nCategory: ${team.cat}\nDesc: ${team.desc||"N/A"}\nNotes: ${(team.stallNotes||"None").slice(0,200)}\nPitch: ${(team.pitchNotes||"None").slice(0,200)}\n\nReply ONLY in this format:\nINNOVATION: 7\nTECHNICAL: 8\nIMPACT: 6\nSCALABILITY: 7\nPRESENTATION: 8\nANALYSIS: Two honest sentences.\nVERDICT: GOOD`);
      const sc={innovation:pN(t,"INNOVATION"),technical:pN(t,"TECHNICAL"),impact:pN(t,"IMPACT"),scalability:pN(t,"SCALABILITY"),presentation:pN(t,"PRESENTATION")};
      const vr=["STRONG","GOOD","AVERAGE","WEAK"].find(v=>pS(t,"VERDICT","GOOD").toUpperCase().includes(v))||"GOOD";
      upd({aiScores:sc,aiAnalysis:pS(t,"ANALYSIS","Assessment complete."),aiVerdict:vr});
      sSec(2);
    }catch(e){sAE(e.message==="NO_KEY"?"No API key — add in Settings ⚙":e.message);}
    sAL(false);
  };
  const SECS=[{i:"❓",l:"Q&A"},{i:"✏️",l:"NOTES"},{i:"🎯",l:"SCORE"}];
  return <div className="fi" style={{display:"flex",flexDirection:"column",gap:"0"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:CARD,borderRadius:"10px",marginBottom:"10px",border:`1px solid ${A}30`}}>
      <div><div style={{fontSize:"15px",fontWeight:"bold",color:TX}}>{team.name}</div><div style={{fontSize:"10px",color:DIM}}>{team.cat.split("/")[0].trim()}</div></div>
      <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
        {fT>0&&<div style={{textAlign:"right"}}><div style={{fontSize:"20px",fontWeight:"bold",color:team.finalized?GR:A}}>{fT}</div><div style={{fontSize:"9px",color:DIM}}>/10</div></div>}
        <Btn v="outline" s={{padding:"6px 10px",fontSize:"10px"}} ch="← BACK" onClick={back}/>
      </div>
    </div>
    <div style={{display:"flex",background:CARD,borderRadius:"8px",marginBottom:"12px",border:`1px solid ${BD}`,overflow:"hidden"}}>
      {SECS.map((s,i)=><button key={i} onClick={()=>sSec(i)} style={{flex:1,padding:"11px 4px",border:"none",cursor:"pointer",background:sec===i?"#131a2e":"transparent",color:sec===i?A:DIM,fontFamily:"'Courier New',monospace",fontSize:"11px",fontWeight:sec===i?"bold":"normal",borderBottom:sec===i?`2px solid ${A}`:"2px solid transparent",transition:"all .2s"}}><div style={{fontSize:"16px"}}>{s.i}</div>{s.l}</button>)}
    </div>
    {sec===0&&<div style={{display:"flex",flexDirection:"column",gap:"10px"}} className="fi">
      <Crd s={{borderColor:`${tc}30`}} ch={<div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:"10px",marginBottom:"8px"}}>
          <div style={{fontSize:"36px",fontWeight:"bold",color:tc,letterSpacing:"4px",textShadow:run?`0 0 16px ${tc}60`:"none",fontVariantNumeric:"tabular-nums"}}>{fmt(tl)}</div>
          <div style={{display:"flex",gap:"5px",flexWrap:"wrap",justifyContent:"flex-end"}}>
            {[5,7,10].map(m=><Btn key={m} v="outline" s={{padding:"5px 8px",fontSize:"10px"}} ch={`${m}m`} onClick={()=>{sTL(m*60);sRun(false);}}/>)}
            {!run?<Btn s={{padding:"5px 10px",fontSize:"11px"}} ch="▶" onClick={()=>{if(tl===null)sTL(420);sRun(true);}}/>:<Btn v="outline" s={{padding:"5px 10px",fontSize:"11px"}} ch="⏸" onClick={()=>{sRun(false);clearInterval(tmr.current);}}/>}
            <Btn v="outline" s={{padding:"5px 8px",fontSize:"11px"}} ch="↺" onClick={()=>{sRun(false);clearInterval(tmr.current);sTL(null);}}/>
          </div>
        </div>
        {tl===0&&<div style={{color:RD,fontSize:"11px",letterSpacing:"2px"}}>⏰ TIME UP!</div>}
      </div>}/>
      <Info c={BL} ch={<><strong>🔬 Focus: </strong>{bk.p}</>}/>
      <Crd ch={<><Lbl ch="EXPERT QUESTIONS TO ASK"/>{bk.q.map((q,i)=><div key={i} style={{display:"flex",gap:"10px",marginBottom:"10px"}}><span style={{color:A,fontWeight:"bold",minWidth:"22px",fontSize:"11px",paddingTop:"2px"}}>Q{i+1}</span><span style={{fontSize:"12px",lineHeight:"1.6",color:TX}}>{q}</span></div>)}</>}/>
      <Crd s={{borderColor:`${RD}25`}} ch={<><Lbl c={RD} ch="🚩 RED FLAGS"/>{bk.r.map((r,i)=><div key={i} style={{display:"flex",gap:"8px",marginBottom:"8px"}}><span style={{color:RD,minWidth:"14px"}}>⚠</span><span style={{fontSize:"12px",color:"#fca5a5",lineHeight:"1.5"}}>{r}</span></div>)}</>}/>
    </div>}
    {sec===1&&<div style={{display:"flex",flexDirection:"column",gap:"10px"}} className="fi">
      <Crd ch={<><Lbl ch="STALL OBSERVATIONS"/><Fta rows={5} value={team.stallNotes} onChange={e=>upd({stallNotes:e.target.value})} placeholder="Demo quality, team confidence, technical depth, audience reaction..."/></>}/>
      <Crd ch={<><Lbl ch="PITCH SUMMARY (used for AI scoring)"/><Fta rows={4} value={team.pitchNotes} onChange={e=>upd({pitchNotes:e.target.value})} placeholder="Their claims — market, tech, traction, vision, numbers..."/></>}/>
      <div style={{textAlign:"center"}}><Btn ch="→ GO TO SCORE TAB" onClick={()=>sSec(2)} v="outline"/></div>
    </div>}
    {sec===2&&<div style={{display:"flex",flexDirection:"column",gap:"10px"}} className="fi">
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px"}}>
        <Crd s={{textAlign:"center",padding:"10px"}} ch={<><div style={{fontSize:"9px",color:A,letterSpacing:"1px",marginBottom:"3px"}}>MANUAL</div><div style={{fontSize:"26px",fontWeight:"bold",color:A}}>{mT||"—"}</div></>}/>
        <Crd s={{textAlign:"center",padding:"10px",borderColor:`${BL}30`}} ch={<><div style={{fontSize:"9px",color:BL,letterSpacing:"1px",marginBottom:"3px"}}>AI SCORE</div><div style={{fontSize:"26px",fontWeight:"bold",color:BL}}>{aiT!==null?aiT:"—"}</div></>}/>
        <Crd s={{textAlign:"center",padding:"10px",borderColor:team.finalized?`${GR}50`:BD}} ch={<><div style={{fontSize:"9px",color:GR,letterSpacing:"1px",marginBottom:"3px"}}>FINAL</div><div style={{fontSize:"26px",fontWeight:"bold",color:team.finalized?GR:TX}}>{fT||"—"}</div></>}/>
      </div>
      <Crd ch={<>
        <Lbl ch="① YOUR MANUAL SCORES"/>
        {CR.map(c=><div key={c.key} style={{marginBottom:"10px"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:"3px"}}><span style={{fontSize:"11px",color:c.color}}>{c.icon} {c.label}</span><span style={{fontSize:"9px",color:DIM}}>weight {c.w}%</span></div><Sld val={team.manualScores[c.key]} onChange={v=>uM(c.key,v)} color={c.color} disabled={team.finalized}/></div>)}
        <Btn v="outline" full ch="USE MANUAL AS FINAL →" onClick={()=>upd({finalScores:{...team.manualScores}})}/>
      </>}/>
      <Crd s={{borderColor:`${BL}30`}} ch={<>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
          <Lbl c={BL} ch="② AI SCORE — Compare with yours"/>
          <Btn s={{padding:"6px 12px",fontSize:"10px",background:BL,color:"#000",border:`1px solid ${BL}`}} ch={team.aiScores?"↺ REFRESH AI":"✨ GET AI SCORE"} onClick={getAI} loading={al} disabled={team.finalized}/>
        </div>
        {!apiKey&&<Info c={A} ch={<>🔑 Add Anthropic API key in <strong>Settings ⚙</strong>.</>}/>}
        <Err m={ae}/>
        {team.aiScores?<>
          {team.aiAnalysis&&<div style={{fontSize:"11px",color:"#93c5fd",padding:"8px",background:"#0a1020",borderRadius:"6px",marginBottom:"10px",lineHeight:"1.6"}}>{team.aiAnalysis}</div>}
          <div style={{background:"#090b12",borderRadius:"8px",padding:"10px",marginBottom:"10px"}}>
            <div style={{display:"grid",gridTemplateColumns:"auto 1fr 26px 26px",gap:"6px 8px",alignItems:"center"}}>
              <div/><div/><span style={{fontSize:"8px",color:A,textAlign:"center"}}>YOU</span><span style={{fontSize:"8px",color:BL,textAlign:"center"}}>AI</span>
              {CR.map(c=>{const m=team.manualScores[c.key]||0,a=team.aiScores[c.key]||0,diff=+(a-m).toFixed(1);return[
                <span key={c.key+"l"} style={{fontSize:"10px",color:c.color,whiteSpace:"nowrap"}}>{c.icon} {c.label}</span>,
                <div key={c.key+"b"} style={{height:"6px",background:BD,borderRadius:"3px",position:"relative"}}><div style={{position:"absolute",left:0,width:`${m*10}%`,height:"100%",background:A,borderRadius:"3px",opacity:0.7}}/><div style={{position:"absolute",left:0,width:`${a*10}%`,height:"4px",top:"1px",background:BL,borderRadius:"3px",opacity:0.6}}/></div>,
                <span key={c.key+"m"} style={{fontSize:"12px",fontWeight:"bold",color:A,textAlign:"center"}}>{m}</span>,
                <div key={c.key+"a"} style={{textAlign:"center",position:"relative"}}><span style={{fontSize:"12px",fontWeight:"bold",color:BL}}>{a}</span>{diff!==0&&<span style={{position:"absolute",top:"-8px",right:"-2px",fontSize:"8px",color:diff>0?GR:RD,fontWeight:"bold"}}>{diff>0?`+${diff}`:diff}</span>}</div>
              ];})}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"6px"}}>
            <Btn v="outline" s={{width:"100%",fontSize:"10px",padding:"8px 4px"}} ch="USE AI" onClick={()=>upd({finalScores:{...team.aiScores}})}/>
            <Btn v="outline" s={{width:"100%",fontSize:"10px",padding:"8px 4px",borderColor:"#a78bfa",color:"#a78bfa"}} ch="AVERAGE" onClick={()=>{const avg={};CR.forEach(c=>{avg[c.key]=parseFloat(((team.manualScores[c.key]+(team.aiScores?.[c.key]||0))/2).toFixed(1));});upd({finalScores:avg});}}/>
            <Btn v="outline" s={{width:"100%",fontSize:"10px",padding:"8px 4px"}} ch="USE MINE" onClick={()=>upd({finalScores:{...team.manualScores}})}/>
          </div>
        </>:<div style={{color:DIM,fontSize:"11px",textAlign:"center",padding:"14px 0"}}>{apiKey?"Tap GET AI SCORE above":"Add API key in Settings ⚙"}</div>}
      </>}/>
      <Crd s={{borderColor:`${GR}40`}} ch={<>
        <Lbl c={GR} ch="③ FINAL SCORE — Adjust then Lock"/>
        {team.aiScores&&<div style={{fontSize:"10px",color:DIM,marginBottom:"10px"}}>Ref: <span style={{color:A}}>amber=manual</span> · <span style={{color:BL}}>blue=AI</span></div>}
        {CR.map(c=><div key={c.key} style={{marginBottom:"10px"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:"3px"}}><span style={{fontSize:"11px",color:c.color}}>{c.icon} {c.label}</span>{team.aiScores&&<span style={{fontSize:"9px",color:DIM}}><span style={{color:A}}>{team.manualScores[c.key]}</span> · <span style={{color:BL}}>{team.aiScores[c.key]}</span></span>}</div><Sld val={(team.finalScores||eS())[c.key]} onChange={v=>uF(c.key,v)} color={GR} disabled={team.finalized}/></div>)}
        {!team.finalized
          ?<Btn v="green" full ch={`🔒 LOCK FINAL — ${fT||wt(team.finalScores||eS())}/10`} s={{marginTop:"8px"}} onClick={()=>upd({finalized:true})}/>
          :<div style={{textAlign:"center",padding:"14px",background:"#0a1a0f",borderRadius:"8px",border:`1px solid ${GR}40`,marginTop:"8px"}}>
            <div style={{fontSize:"32px",fontWeight:"bold",color:GR,marginBottom:"4px"}}>{fT}/10</div>
            <div style={{fontSize:"11px",color:"#86efac",marginBottom:"10px"}}>✓ Score Finalized</div>
            <Btn v="outline" s={{borderColor:A,color:A}} ch="UNLOCK TO EDIT" onClick={()=>upd({finalized:false})}/>
          </div>}
      </>}/>
    </div>}
  </div>;
}

// ── RESULTS ───────────────────────────────────────────────────────────────────
function Results({teams,set,apiKey,go}){
  const [ld,sLd]=useState(false);const [er,sEr]=useState("");const [op,sOp]=useState(null);
  const ranked=[...teams].filter(t=>t.finalScores&&wt(t.finalScores)>0).sort((a,b)=>wt(b.finalScores)-wt(a.finalScores));
  const pend=teams.filter(t=>!t.finalScores||wt(t.finalScores)===0);
  const MD=["🥇","🥈","🥉"];const VC={STRONG:GR,GOOD:A,AVERAGE:"#fb923c",WEAK:RD};
  const runOne=async(team)=>{
    const t=await ai(`HACKFUSION 2026 judge. Rate 0-10.\nProject: ${team.name}, Category: ${team.cat}\nNotes: ${(team.stallNotes||team.pitchNotes||"None").slice(0,250)}\n\nReply ONLY:\nINNOVATION: 7\nTECHNICAL: 8\nIMPACT: 6\nSCALABILITY: 7\nPRESENTATION: 8\nANALYSIS: Two sentences.\nVERDICT: GOOD`);
    set(ts=>ts.map(x=>x.id===team.id?{...x,aiScores:{innovation:pN(t,"INNOVATION"),technical:pN(t,"TECHNICAL"),impact:pN(t,"IMPACT"),scalability:pN(t,"SCALABILITY"),presentation:pN(t,"PRESENTATION")},aiAnalysis:pS(t,"ANALYSIS","Assessment complete."),aiVerdict:["STRONG","GOOD","AVERAGE","WEAK"].find(v=>pS(t,"VERDICT","GOOD").toUpperCase().includes(v))||"GOOD"}:x));
  };
  const runAll=async()=>{
    if(!apiKey){sEr("Add API key in Settings ⚙");return;}
    sEr("");sLd(true);
    const ts=teams.filter(t=>t.visited&&!t.aiScores);
    if(!ts.length){sEr("No unscored visited teams.");sLd(false);return;}
    for(const t of ts){try{await runOne(t);}catch(e){sEr("Error on "+t.name+": "+e.message);break;}}
    sLd(false);
  };
  return <div className="fi" style={{display:"flex",flexDirection:"column",gap:"12px"}}>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"8px"}}>
      {[["TOTAL",teams.length,TX],["SCORED",ranked.length,A],["FINAL",teams.filter(t=>t.finalized).length,GR]].map(([l,n,c])=><Crd key={l} s={{textAlign:"center",padding:"10px"}} ch={<><div style={{fontSize:"24px",fontWeight:"bold",color:c}}>{n}</div><div style={{fontSize:"9px",color:DIM,letterSpacing:"1px"}}>{l}</div></>}/>)}
    </div>
    <Btn full loading={ld} disabled={!apiKey} ch="✨ GET AI SCORES FOR ALL VISITED TEAMS" onClick={runAll} s={{opacity:!apiKey?0.5:1}}/>
    {!apiKey&&<Info c={A} ch={<>🔑 Add Anthropic API key in <strong>Settings ⚙</strong> to enable AI scoring.</>}/>}
    <Err m={er}/>
    {teams.length>0&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
      <Btn v="outline" s={{width:"100%",borderColor:GR,color:GR,padding:"12px 8px"}} ch={<span style={{display:"block",textAlign:"center"}}>📄 PDF REPORT<br/><span style={{fontSize:"9px",opacity:0.7}}>Print / Save</span></span>} onClick={()=>xPDF(teams)}/>
      <Btn v="outline" s={{width:"100%",borderColor:BL,color:BL,padding:"12px 8px"}} ch={<span style={{display:"block",textAlign:"center"}}>📊 CSV / EXCEL<br/><span style={{fontSize:"9px",opacity:0.7}}>Download file</span></span>} onClick={()=>xCSV(teams)}/>
    </div>}
    {ranked.length>0&&<Crd ch={<><Lbl ch="🏆 LEADERBOARD"/>
      {ranked.map((t,i)=>{const tot=wt(t.finalScores),io=op===t.id;return<div key={t.id} style={{marginBottom:"6px"}}>
        <div onClick={()=>sOp(io?null:t.id)} style={{display:"flex",alignItems:"center",gap:"10px",padding:"10px",background:io?"#131a2e":"#090b12",borderRadius:io?"8px 8px 0 0":"8px",cursor:"pointer",border:`1px solid ${io?A+"40":BD}`}}>
          <span style={{fontSize:"20px",minWidth:"26px"}}>{MD[i]||`#${i+1}`}</span>
          <div style={{flex:1,minWidth:0}}><div style={{fontWeight:"bold",fontSize:"13px",color:TX}}>{t.name}</div><div style={{fontSize:"10px",color:DIM}}>{t.cat.split("/")[0].trim()}</div></div>
          <div style={{textAlign:"right"}}><div style={{fontSize:"22px",fontWeight:"bold",color:i===0?A:TX}}>{tot}</div><div style={{fontSize:"9px",color:DIM}}>/10</div></div>
        </div>
        {io&&<div style={{padding:"12px",background:"#0a0d15",borderRadius:"0 0 8px 8px",border:`1px solid ${BD}`,borderTop:"none"}}>
          {CR.map(c=><div key={c.key} style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"7px"}}>
            <span style={{fontSize:"10px",color:c.color,width:"86px"}}>{c.icon} {c.label}</span>
            <div style={{flex:1,height:"6px",background:BD,borderRadius:"3px",position:"relative"}}><div style={{position:"absolute",left:0,width:`${(t.finalScores[c.key]||0)*10}%`,height:"100%",background:c.color,borderRadius:"3px"}}/></div>
            <span style={{fontSize:"12px",color:c.color,fontWeight:"bold",width:"22px",textAlign:"right"}}>{t.finalScores[c.key]}</span>
            {t.aiScores&&<span style={{fontSize:"9px",color:BL,width:"32px"}}>AI:{t.aiScores[c.key]}</span>}
          </div>)}
          {t.aiAnalysis&&<div style={{fontSize:"11px",color:"#93c5fd",padding:"8px",background:"#0a1020",borderRadius:"6px",marginBottom:"8px",lineHeight:"1.6"}}>{t.aiAnalysis}</div>}
          {t.aiVerdict&&<Pill c={VC[t.aiVerdict]||A} ch={t.aiVerdict}/>}
          <div style={{marginTop:"10px"}}><Btn s={{padding:"6px 12px",fontSize:"10px"}} ch="EDIT SCORES" onClick={()=>go(t.id)}/></div>
        </div>}
      </div>;})}
    </>}/>}
    {pend.length>0&&<Crd ch={<><Lbl c={DIM} ch={`PENDING (${pend.length})`}/>{pend.map(t=><div key={t.id} onClick={()=>go(t.id)} style={{display:"flex",alignItems:"center",gap:"10px",padding:"8px",background:"#090b12",borderRadius:"6px",marginBottom:"6px",cursor:"pointer"}}><span style={{color:DIM}}>○</span><span style={{flex:1,fontSize:"13px",color:DIM}}>{t.name}</span><Pill c={DIM} ch={t.visited?"VISITED":"NOT VISITED"}/></div>)}</>}/>}
    {ranked.length===0&&pend.length===0&&<div style={{textAlign:"center",color:DIM,padding:"40px 0"}}>Add teams and judge them to see results →</div>}
  </div>;
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────

      <Lbl ch="ANTHROPIC API KEY"/>
      <div style={{position:"relative",marginBottom:"10px"}}>
        <Fi type={show?"text":"password"} value={k} onChange={e=>sK(e.target.value)} placeholder="sk-ant-api03-..." s={{paddingRight:"44px"}}/>
        <button onClick={()=>sShow(s=>!s)} style={{position:"absolute",right:"10px",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:DIM,cursor:"pointer",fontSize:"14px"}}>{show?"🙈":"👁️"}</button>
      </div>
      <div style={{fontSize:"9px",color:DIM,marginBottom:"10px"}}>Saved in localStorage — persists between sessions. Never shared.</div>
      <div style={{display:"flex",gap:"8px"}}>
        <Btn s={{flex:1}} ch={saved?"✓ SAVED!":"SAVE KEY"} onClick={save}/>
        {k&&<Btn v="danger" ch="CLEAR" onClick={()=>{sK("");onSave("");}}/>}
      </div>
      {apiKey&&<div style={{marginTop:"10px",padding:"8px",background:"#0a1a0f",borderRadius:"6px",border:`1px solid ${GR}30`,fontSize:"11px",color:GR}}>✓ API key active — AI features enabled</div>}
    </>}/>
    <Crd ch={<>
      <Lbl ch="📱 INSTALL AS PWA APP"/>
      <div style={{fontSize:"11px",color:DIM,lineHeight:"1.9",marginBottom:"12px"}}>
        <strong style={{color:TX}}>iPhone Safari:</strong> Tap <strong style={{color:A}}>Share ↑</strong> → "Add to Home Screen" → Add<br/>
        <strong style={{color:TX}}>Android Chrome:</strong> Tap <strong style={{color:A}}>⋮</strong> → "Add to Home screen" → Install<br/>
        <span style={{color:"#475569",fontSize:"10px"}}>⚖️ JudgePro icon · Full screen · Works offline · Data persists</span>
      </div>
      {inst?<Btn full ch="⬇ INSTALL APP NOW" onClick={install}/>:<div style={{padding:"10px",background:"#090b12",borderRadius:"6px",fontSize:"11px",color:DIM,textAlign:"center"}}>Use Share/Menu method above on your phone</div>}
    </>}/>
    <Crd ch={<>
      <Lbl ch="EXPORT DATA"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"8px"}}>
        <Btn v="outline" s={{width:"100%",borderColor:GR,color:GR}} ch="📄 PDF REPORT" onClick={()=>xPDF(teams)}/>
        <Btn v="outline" s={{width:"100%",borderColor:BL,color:BL}} ch="📊 CSV EXPORT" onClick={()=>xCSV(teams)}/>
      </div>
      <div style={{fontSize:"9px",color:DIM}}>PDF: Full scorecard · CSV: All data for Excel / Google Sheets</div>
    </>}/>
    <Crd ch={<>
      <Lbl ch="DATA"/>
      <div style={{fontSize:"11px",color:DIM,marginBottom:"10px"}}>All data saved in localStorage — survives browser close, restart, and phone reboot. Only cleared here.</div>
      <Btn v="danger" full ch="🗑 CLEAR ALL TEAMS & SCORES" onClick={()=>{if(window.confirm("Delete ALL data? Cannot be undone."))set([]);}}/>
    </>}/>
    <Crd s={{background:"#0a0d15"}} ch={<><Lbl ch="ABOUT"/><div style={{fontSize:"11px",color:DIM,lineHeight:"1.8"}}><strong style={{color:TX}}>HackFusion Judge Pro v3.0</strong><br/>All-in-One Expert Judging Tool<br/>HACKFUSION 2026 — National Project Expo<br/><span style={{color:A}}>Built with Claude AI · Anthropic</span></div></>}/>
  </div>;
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function App(){
  const [screen,sSc]=useState("teams");
  const [teams,setTeamsRaw]=useState(()=>LS.g("hfj_teams",[]));
  const [aid,sAid]=useState(null);
  const [apiKey,sApiKey]=useState(()=>LS.g("hfj_apikey",""));

  useEffect(()=>{const k=LS.g("hfj_apikey","");if(k){sApiKey(k);sKey(k);}},[]);

  const setTeams=useCallback(fn=>{
    setTeamsRaw(prev=>{const next=typeof fn==="function"?fn(prev):fn;LS.s("hfj_teams",next);return next;});
  },[]);

  const hKey=k=>{sApiKey(k);sKey(k);LS.s("hfj_apikey",k);};
  const upd=useCallback((id,patch)=>setTeams(ts=>ts.map(t=>t.id===id?{...t,...patch}:t)),[setTeams]);
  const at=aid?teams.find(t=>t.id===aid):null;
  const go=id=>{sAid(id);sSc("judge");};
  const v=teams.filter(t=>t.visited).length,f=teams.filter(t=>t.finalized).length;
  const NAV=[{id:"teams",i:"👥",l:"TEAMS"},{id:"judge",i:"⚖️",l:"JUDGE"},{id:"results",i:"🏆",l:"RESULTS"},{id:"settings",i:"⚙️",l:"SETTINGS"}];

  return <div style={{fontFamily:"'Courier New',monospace",background:BG,minHeight:"100vh",color:TX,maxWidth:"600px",margin:"0 auto"}}>
    <div style={{background:"linear-gradient(135deg,#0d1117,#0a0f1e)",borderBottom:`1px solid ${A}25`,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:50,paddingTop:"max(12px,env(safe-area-inset-top))"}}>
      <div>
        <div style={{fontSize:"9px",color:A,letterSpacing:"3px"}}>◈ HACKFUSION 2026</div>
        <div style={{fontSize:"17px",fontWeight:"bold",color:"#fff"}}>{screen==="judge"&&at?at.name:"Judge Pro ⚖️"}</div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
        {teams.length>0&&<div style={{fontSize:"9px",textAlign:"right"}}><div style={{color:A}}>{v}/{teams.length} visited</div><div style={{color:GR}}>{f} final</div></div>}
        <div style={{width:"8px",height:"8px",borderRadius:"50%",background:apiKey?GR:A,boxShadow:`0 0 6px ${apiKey?GR:A}`}}/>
      </div>
    </div>
    <div style={{display:"flex",background:CARD,borderBottom:`1px solid ${BD}`,position:"sticky",top:"58px",zIndex:49}}>
      {NAV.map(n=><button key={n.id} onClick={()=>{sSc(n.id);if(n.id!=="judge")sAid(null);}} style={{flex:1,padding:"10px 2px",border:"none",cursor:"pointer",background:screen===n.id?"#131a2e":"transparent",color:screen===n.id?A:DIM,fontFamily:"'Courier New',monospace",fontSize:"9px",fontWeight:screen===n.id?"bold":"normal",borderBottom:screen===n.id?`2px solid ${A}`:"2px solid transparent",transition:"all .2s"}}><div style={{fontSize:"15px"}}>{n.i}</div>{n.l}</button>)}
    </div>
    <div style={{padding:"14px 14px 100px"}}>
      {screen==="teams"&&<Teams teams={teams} set={setTeams} go={go}/>}
      {screen==="judge"&&(at
        ?<Judge team={at} upd={p=>upd(aid,p)} back={()=>{sSc("teams");sAid(null);}} apiKey={apiKey}/>
        :<div className="fi" style={{display:"flex",flexDirection:"column",gap:"10px"}}>
          <Info ch={<>Select a team from <strong style={{color:A}}>TEAMS</strong> and tap JUDGE.</>}/>
          {teams.map(t=><Crd key={t.id} onClick={()=>go(t.id)} s={{cursor:"pointer",borderLeft:`3px solid ${t.finalized?GR:t.visited?A:BD}`}} ch={<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:"bold",color:TX}}>{t.name}</div><div style={{fontSize:"10px",color:DIM,marginTop:"2px"}}>{t.cat.split("/")[0].trim()}</div></div><div style={{display:"flex",alignItems:"center",gap:"8px"}}>{t.finalized&&<Pill c={GR} ch={`✓ ${wt(t.finalScores)}`}/>}{t.visited&&!t.finalized&&<Pill c={A} ch="VISITED"/>}<span style={{color:DIM,fontSize:"16px"}}>→</span></div></div>}/>)}
          {teams.length===0&&<div style={{textAlign:"center",color:DIM,padding:"40px 0"}}>Add teams in TEAMS tab first →</div>}
        </div>
      )}
      {screen==="results"&&<Results teams={teams} set={setTeams} apiKey={apiKey} go={go}/>}
      {screen==="settings"&&<Settings apiKey={apiKey} onSave={hKey} teams={teams} set={setTeams}/>}
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
