// ── Data ─────────────────────────────────────────────────────────────────────
const CATS = [
  "Hardware / IoT / Embedded Systems",

  "AI / ML / Computer Vision / NLP",
  "Sustainable Tech / Green Energy",
  "Agrotech / Waste-to-Wealth / Rural",

const CR = [
  {key:"innovation",  label:"Innovation",   icon:"💡", color:"#a78bfa", w:25},
  {key:"technical",   label:"Technical",    icon:"⚙️",  color:BL,        w:25},
  {key:"impact",      label:"Impact",       icon:"🌍", color:GR,         w:20},
  {key:"scalability", label:"Scalability",  icon:"📈", color:A,          w:15},
  {key:"presentation",label:"Presentation", icon:"🎤", color:"#f472b6",  w:15}
];

const eS = () => ({innovation:0, technical:0, impact:0, scalability:0, presentation:0});
const wt = s => {
  if (!s) return 0;
  return parseFloat((CR.reduce((t,c) => t + (s[c.key]||0) * c.w, 0) / 100).toFixed(1));
};

const LS = {

// ── Question Bank ─────────────────────────────────────────────────────────────
const QB = {
  "Hardware / IoT / Embedded Systems": {
    q:["Walk me through end-to-end data flow — sensor to decision. What at each layer?",

       "How does it behave when network drops? Show offline/edge logic.",
       "What is power consumption and realistic battery life in deployment?",
       "How do you handle sensor calibration drift?",
       "Security model — auth, encryption, OTA updates?",
       "1,000 unit deployment cost — walk me through your BOM."],
    r:["Demo only on local WiFi — no field deployment data",
       "Cannot explain what happens when a node loses connectivity",
       "Power tested on bench only","No security model — firmware unencrypted"],
    p:"Push on real-world failure modes — sensor drift, connectivity loss, power budgets in field."
  },
  "Robotics & Drones / UAVs": {
    q:["Demonstrate a failure scenario — noisy sensor input?",

       "Walk through safety kill-switch and fail-safe architecture.",
       "Regulatory compliance — DGCA approvals, geofencing?",

  },
  "AI / ML / Computer Vision / NLP": {

       "Performance under variable conditions — weather, seasons?",

    q:["Real users beyond your team? Show usage analytics.",

       "Data privacy and compliance handling?",

// ── API ───────────────────────────────────────────────────────────────────────
let _key = "";
const sKey = k => { _key = k ? k.trim() : ""; };
const pN = (t,k,d=6) => {
  const m = t.match(new RegExp(k+"\\s*[:\\-]\\s*(\\d+(?:\\.\\d+)?)","i"));
  return m ? Math.min(10, Math.max(0, parseFloat(m[1]))) : d;
};
const pS = (t,k,d="") => {
  const m = t.match(new RegExp(k+"\\s*[:\\-]\\s*(.+)","i"));
  return m ? m[1].trim() : d;
};
async function callAI(prompt) {
  if (!_key) throw new Error("NO_KEY");
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key":_key,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body: JSON.stringify({model:"claude-sonnet-4-20250514", max_tokens:600,
      messages:[{role:"user", content:prompt}]})
  });
  const txt = await res.text();
  let d; try { d = JSON.parse(txt); } catch(e) { throw new Error("Bad response: "+txt.slice(0,60)); }
  if (d.error) throw new Error(d.error.message||"API error");
  const o = (d.content||[]).map(b=>b.text||"").join("").trim();
  if (!o) throw new Error("Empty response");
  return o;
}

// ── PDF Export ────────────────────────────────────────────────────────────────
function xPDF(teams) {
  const ranked = [...teams].filter(t=>t.finalScores&&wt(t.finalScores)>0)
    .sort((a,b)=>wt(b.finalScores)-wt(a.finalScores));
  const now = new Date().toLocaleString("en-IN");
  const MD = ["🥇","🥈","🥉"];
  const ck = ["innovation","technical","impact","scalability","presentation"];
  const cl = ["Innovation","Technical","Impact","Scalability","Presentation"];
  const cc = ["#7c3aed","#2563eb","#16a34a","#d97706","#db2777"];
  const cw = [25,25,20,15,15];

  const cards = ranked.map((t,i) => {
    const rows = ck.map((k,ci) =>
      `<tr style="border-bottom:1px solid #f1f5f9">
        <td style="padding:6px 8px;color:${cc[ci]};font-weight:600">${cl[ci]}</td>

        <td style="padding:6px 8px;text-align:center;font-weight:bold;color:#2563eb">${t.aiScores?t.aiScores[k]||0:"—"}</td>
        <td style="padding:6px 8px;text-align:center;font-weight:bold;color:#16a34a;background:#f0fdf4">${t.finalScores?t.finalScores[k]||0:"—"}</td>
      </tr>`).join("");
    return `<div style="break-inside:avoid;margin-bottom:20px;border:1px solid #d1d5db;border-radius:10px;overflow:hidden">
      <div style="background:${i===0?"#1e1b4b":i===1?"#1e3a5f":"#1a2530"};padding:12px 16px;display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:14px;font-weight:bold;color:#fff">${MD[i]||"#"+(i+1)} ${t.name}</div>
        <div style="font-size:10px;color:#94a3b8">${t.cat}</div></div>
        <div style="text-align:right"><div style="font-size:28px;font-weight:bold;color:#f59e0b">${wt(t.finalScores)}</div>
        <div style="font-size:10px;color:#64748b">/10</div></div>
      </div>
      <div style="padding:12px 16px;background:#fff">
        <table style="width:100%;border-collapse:collapse;margin-bottom:10px;font-size:11px">
          <thead><tr style="background:#f8fafc">
            <th style="padding:6px 8px;text-align:left;border-bottom:2px solid #e2e8f0">Criterion</th>
            <th style="padding:6px 8px;text-align:center;border-bottom:2px solid #e2e8f0">Wt</th>
            <th style="padding:6px 8px;text-align:center;border-bottom:2px solid #e2e8f0;color:#f59e0b">Manual</th>
            <th style="padding:6px 8px;text-align:center;border-bottom:2px solid #e2e8f0;color:#2563eb">AI</th>
            <th style="padding:6px 8px;text-align:center;border-bottom:2px solid #e2e8f0;color:#16a34a;background:#f0fdf4">Final</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
        ${t.aiAnalysis?`<div style="background:#eff6ff;border-left:4px solid #2563eb;padding:8px 10px;font-size:11px;color:#1e40af;margin-bottom:8px"><strong>AI: </strong>${t.aiAnalysis}</div>`:""}
      </div>
    </div>`;
  }).join("");

  const sumRows = ranked.map((t,i) =>
    `<tr style="background:${i%2===0?"#f8fafc":"#fff"};border-bottom:1px solid #e2e8f0">
      <td style="padding:9px 10px;font-size:16px">${MD[i]||"#"+(i+1)}</td>
      <td style="padding:9px 10px;font-weight:bold">${t.name}</td>
      <td style="padding:9px 10px;color:#475569;font-size:10px">${t.cat.split("/")[0].trim()}</td>
      <td style="padding:9px 10px;text-align:center;color:#f59e0b;font-weight:bold">${wt(t.manualScores)||"—"}</td>
      <td style="padding:9px 10px;text-align:center;color:#2563eb;font-weight:bold">${t.aiScores?wt(t.aiScores):"—"}</td>
      <td style="padding:9px 10px;text-align:center;font-size:16px;font-weight:bold;color:${i===0?"#f59e0b":i===1?"#94a3b8":i===2?"#b45309":"#0f172a"}">${wt(t.finalScores)}</td>
      <td style="padding:9px 10px;text-align:center"><span style="font-size:9px;padding:2px 7px;border-radius:10px;background:${t.finalized?"#dcfce7":"#fef9c3"};color:${t.finalized?"#16a34a":"#ca8a04"}">${t.finalized?"FINAL":"SCORED"}</span></td>

          <th style="padding:9px 10px">Rank</th><th style="padding:9px 10px;text-align:left">Team</th>
          <th style="padding:9px 10px;text-align:left">Category</th>
          <th style="padding:9px 10px;text-align:center;color:#fde68a">Manual</th>
          <th style="padding:9px 10px;text-align:center;color:#93c5fd">AI</th>
          <th style="padding:9px 10px;text-align:center;background:#f59e0b;color:#000">Final</th>
          <th style="padding:9px 10px;text-align:center">Status</th>
        </tr></thead>

    </div></body></html>`;

  const w = window.open("","_blank");
  if (w) { w.document.write(html); w.document.close(); }
  else alert("Allow popups to open PDF report.");

// ── CSV Export ────────────────────────────────────────────────────────────────
function xCSV(teams) {
  const ck = ["innovation","technical","impact","scalability","presentation"];
  const cl = ["Innovation","Technical","Impact","Scalability","Presentation"];
  const esc = v => { const s=String(v==null?"":v); return (s.includes(",")||s.includes('"')||s.includes("\n"))?`"${s.replace(/"/g,'""')}"`:s; };
  const hdr = ["#","Team","Category","Description","Visited","Finalized",
    ...cl.map(c=>c+" (Manual)"),["Manual Total"],
    ...cl.map(c=>c+" (AI)"),["AI Total"],
    ...cl.map(c=>c+" (Final)"),["Final Score"],
    "AI Analysis","AI Verdict","Stall Notes","Pitch Notes"].flat();
  const rows = teams.map((t,i) => [
    i+1, t.name, t.cat, t.desc||"", t.visited?"Yes":"No", t.finalized?"Yes":"No",
    ...ck.map(k=>t.manualScores[k]||0), wt(t.manualScores)||"",
    ...ck.map(k=>t.aiScores?t.aiScores[k]||0:""), t.aiScores?wt(t.aiScores):"",
    ...ck.map(k=>t.finalScores?t.finalScores[k]||0:""), t.finalScores?wt(t.finalScores):"",
    t.aiAnalysis||"", t.aiVerdict||"", t.stallNotes||"", t.pitchNotes||""
  ]);
  const csv = [hdr,...rows].map(r=>r.map(esc).join(",")).join("\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"}));
  a.download = "HackFusion2026_"+new Date().toISOString().slice(0,10)+".csv";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function Btn({ch,onClick,loading,disabled,s={},v="primary",full}) {
  const bg = v==="primary"?A : v==="green"?GR : v==="danger"?RD : "transparent";
  const co = v==="outline"?A : v==="danger"?"#fff" : "#000";

}

    <span style={{color, fontWeight:"bold", fontSize:"18px", minWidth:"30px", textAlign:"right", fontVariantNumeric:"tabular-nums"}}>{val}</span>

}

  : null;

const Info = ({ch,c=BL}) =>
  <div style={{padding:"10px 12px",background:"#0a0d15",border:`1px solid ${c}30`,borderRadius:"8px",fontSize:"11px",color:c,lineHeight:"1.7"}}>{ch}</div>;

// ── Teams ─────────────────────────────────────────────────────────────────────
function Teams({teams,set,go}) {
  const [n,sN] = useState("");
  const [cat,sCat] = useState(CATS[0]);
  const [d,sD] = useState("");
  const [eid,sE] = useState(null);

  const save = () => {
    if (!n.trim()) return;
    if (eid) {
      set(ts => ts.map(t => t.id===eid ? {...t,name:n.trim(),cat,desc:d} : t));
      sE(null);
    } else {
      set(ts => [...ts, mkT(n.trim(),cat,d)]);
    }
    sN(""); sD(""); sCat(CATS[0]);
  };

  const v = teams.filter(t=>t.visited).length;
  const f = teams.filter(t=>t.finalized).length;

  return <div className="fi" style={{display:"flex",flexDirection:"column",gap:"12px"}}>
    {teams.length>0 && <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px"}}>
      {[["TOTAL",teams.length,TX],["VISITED",v,A],["DONE",f,GR]].map(([l,n,c])=>
        <Crd key={l} s={{textAlign:"center",padding:"10px"}} ch={
          <><div style={{fontSize:"24px",fontWeight:"bold",color:c}}>{n}</div>
          <div style={{fontSize:"9px",color:DIM,letterSpacing:"1px"}}>{l}</div></>
        }/>
      )}
    </div>}

    <Crd s={{borderColor:eid?`${A}50`:BD}} ch={
      <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
        <Lbl ch={eid?"EDIT TEAM":"ADD TEAM / PROJECT"}/>
        <Fi value={n} onChange={e=>sN(e.target.value)} placeholder="Team / Project name"
          onKeyDown={e=>e.key==="Enter"&&save()}/>
        <Fsl value={cat} onChange={e=>sCat(e.target.value)}
          ch={CATS.map(c=><option key={c}>{c}</option>)}/>
        <Fta rows={2} value={d} onChange={e=>sD(e.target.value)} placeholder="Brief description (optional)"/>
        <div style={{display:"flex",gap:"8px"}}>
          <Btn ch={eid?"✓ UPDATE":"+ ADD TEAM"} onClick={save}/>
          {eid && <Btn v="outline" ch="CANCEL" onClick={()=>{sE(null);sN("");sD("");}}/>}
        </div>
      </div>
    }/>

    {teams.length===0
      ? <div style={{textAlign:"center",color:DIM,padding:"40px 0",fontSize:"13px"}}>Add your first team above →</div>
      : teams.map((t,i) =>
          <Crd key={t.id} s={{borderLeft:`3px solid ${t.finalized?GR:t.visited?A:BD}`,cursor:"pointer"}}
            onClick={()=>go(t.id)} ch={
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"8px"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap",marginBottom:"3px"}}>
                  <span style={{fontWeight:"bold",fontSize:"14px",color:TX}}>{i+1}. {t.name}</span>
                  {t.finalized && <Pill c={GR} ch={`✓ ${wt(t.finalScores)}/10`}/>}
                  {t.visited && !t.finalized && <Pill c={A} ch="VISITED"/>}
                </div>
                <div style={{fontSize:"10px",color:DIM}}>{t.cat.split("/")[0].trim()}</div>
              </div>
              <div style={{display:"flex",gap:"5px",flexShrink:0}} onClick={e=>e.stopPropagation()}>
                <Btn s={{padding:"6px 9px",fontSize:"10px"}} ch="JUDGE" onClick={()=>go(t.id)}/>
                <Btn v="outline" s={{padding:"6px 8px"}} ch="✎" onClick={()=>{sE(t.id);sN(t.name);sCat(t.cat);sD(t.desc||"");}}/>
                <Btn v="danger" s={{padding:"6px 8px"}} ch="✕" onClick={()=>{if(window.confirm("Remove?"))set(ts=>ts.filter(x=>x.id!==t.id));}}/>
              </div>
            </div>
          }/>
        )
    }
  </div>;
}

// ── Judge ─────────────────────────────────────────────────────────────────────
function Judge({team,upd,back,apiKey}) {
  const [sec,sSec] = useState(0);
  const [al,sAl] = useState(false);
  const [ae,sAe] = useState("");

  useEffect(() => { if (!team.visited) upd({visited:true}); }, []);

  const bk = gQB(team.cat);
  const mT = wt(team.manualScores);
  const aiT = team.aiScores ? wt(team.aiScores) : null;
  const fT = team.finalScores ? wt(team.finalScores) : null;
  const fs = team.finalScores || eS();

  const uM = (k,v) => upd({manualScores:{...team.manualScores,[k]:v}});
  const uF = (k,v) => upd({finalScores:{...(team.finalScores||eS()),[k]:v}});

  async function getAI() {
    if (!_key) { sAe("No API key — add in Settings ⚙"); return; }
    sAe(""); sAl(true);
    try {
      const t = await callAI(
        `You are judging HACKFUSION 2026 projects.\nProject: ${team.name}\nCategory: ${team.cat}\nDesc: ${team.desc||"N/A"}\nStall Notes: ${(team.stallNotes||"None").slice(0,200)}\nPitch Notes: ${(team.pitchNotes||"None").slice(0,200)}\n\nReply ONLY in this exact format (no extra text):\nINNOVATION: 7\nTECHNICAL: 8\nIMPACT: 6\nSCALABILITY: 7\nPRESENTATION: 8\nANALYSIS: Two honest sentences about this project.\nVERDICT: GOOD`
      );
      const sc = {
        innovation:   pN(t,"INNOVATION"),
        technical:    pN(t,"TECHNICAL"),
        impact:       pN(t,"IMPACT"),
        scalability:  pN(t,"SCALABILITY"),
        presentation: pN(t,"PRESENTATION")
      };
      const vr = pS(t,"VERDICT","GOOD").toUpperCase();
      const verdict = ["STRONG","GOOD","AVERAGE","WEAK"].find(v=>vr.includes(v)) || "GOOD";
      upd({aiScores:sc, aiAnalysis:pS(t,"ANALYSIS","Assessment complete."), aiVerdict:verdict});
      sSec(2);
    } catch(e) {
      sAe(e.message==="NO_KEY" ? "No API key — add in Settings ⚙" : e.message);
    }
    sAl(false);
  }

  const SECS = [{i:"❓",l:"Q&A"},{i:"✏️",l:"NOTES"},{i:"🎯",l:"SCORE"}];

  return <div className="fi" style={{display:"flex",flexDirection:"column",gap:"10px"}}>
    {/* Team header */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:CD,borderRadius:"10px",border:`1px solid ${A}30`}}>
      <div>
        <div style={{fontSize:"15px",fontWeight:"bold",color:TX}}>{team.name}</div>
        <div style={{fontSize:"10px",color:DIM}}>{team.cat.split("/")[0].trim()}</div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
        {fT>0 && <div style={{textAlign:"right"}}>
          <div style={{fontSize:"20px",fontWeight:"bold",color:team.finalized?GR:A}}>{fT}</div>
          <div style={{fontSize:"9px",color:DIM}}>/10</div>
        </div>}
        <Btn v="outline" s={{padding:"6px 10px",fontSize:"10px"}} ch="← BACK" onClick={back}/>
      </div>
    </div>

    {/* Sub-tabs */}
    <div style={{display:"flex",background:CD,borderRadius:"8px",border:`1px solid ${BD}`,overflow:"hidden"}}>
      {SECS.map((s,i) =>
        <button key={i} onClick={()=>sSec(i)} style={{
          flex:1, padding:"11px 4px", border:"none", cursor:"pointer",
          background:sec===i?"#131a2e":"transparent",
          color:sec===i?A:DIM,
          fontFamily:"'Courier New',monospace", fontSize:"11px",
          fontWeight:sec===i?"bold":"normal",
          borderBottom:sec===i?`2px solid ${A}`:"2px solid transparent",
          transition:"all .2s"
        }}>
          <div style={{fontSize:"16px"}}>{s.i}</div>{s.l}
        </button>
      )}
    </div>

    {/* Q&A Tab */}
    {sec===0 && <div className="fi" style={{display:"flex",flexDirection:"column",gap:"10px"}}>
      <Info c={BL} ch={<><strong>🔬 Probe Focus: </strong>{bk.p}</>}/>
      <Crd ch={
        <><Lbl ch="EXPERT QUESTIONS TO ASK"/>
        {bk.q.map((q,i) =>
          <div key={i} style={{display:"flex",gap:"10px",marginBottom:"10px"}}>
            <span style={{color:A,fontWeight:"bold",minWidth:"22px",fontSize:"11px",paddingTop:"2px"}}>Q{i+1}</span>
            <span style={{fontSize:"12px",lineHeight:"1.6",color:TX}}>{q}</span>
          </div>
        )}</>
      }/>
      <Crd s={{borderColor:`${RD}25`}} ch={
        <><Lbl c={RD} ch="🚩 RED FLAGS — watch for these"/>
        {bk.r.map((r,i) =>
          <div key={i} style={{display:"flex",gap:"8px",marginBottom:"8px"}}>
            <span style={{color:RD,minWidth:"14px"}}>⚠</span>
            <span style={{fontSize:"12px",color:"#fca5a5",lineHeight:"1.5"}}>{r}</span>
          </div>
        )}</>
      }/>
    </div>}

    {/* Notes Tab */}
    {sec===1 && <div className="fi" style={{display:"flex",flexDirection:"column",gap:"10px"}}>
      <Crd ch={
        <><Lbl ch="STALL OBSERVATIONS"/>
        <Fta rows={5} value={team.stallNotes}
          onChange={e=>upd({stallNotes:e.target.value})}
          placeholder="Demo quality, team confidence, technical depth, audience reaction..."/>
        </>
      }/>
      <Crd ch={
        <><Lbl ch="PITCH SUMMARY (used for AI scoring)"/>
        <Fta rows={4} value={team.pitchNotes}
          onChange={e=>upd({pitchNotes:e.target.value})}
          placeholder="Their claims — market, tech, traction, vision, numbers..."/>
        <div style={{fontSize:"10px",color:DIM,marginTop:"6px"}}>These notes power the AI scoring — more detail = better AI assessment.</div>
        </>
      }/>
      <div style={{textAlign:"center"}}>
        <Btn ch="→ GO TO SCORE TAB" onClick={()=>sSec(2)} v="outline"/>
      </div>
    </div>}

    {/* Score Tab */}
    {sec===2 && <div className="fi" style={{display:"flex",flexDirection:"column",gap:"10px"}}>
      {/* Scoreboard */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px"}}>
        <Crd s={{textAlign:"center",padding:"10px"}} ch={
          <><div style={{fontSize:"9px",color:A,letterSpacing:"1px",marginBottom:"3px"}}>MANUAL</div>
          <div style={{fontSize:"26px",fontWeight:"bold",color:A}}>{mT||"—"}</div></>
        }/>
        <Crd s={{textAlign:"center",padding:"10px",borderColor:`${BL}30`}} ch={
          <><div style={{fontSize:"9px",color:BL,letterSpacing:"1px",marginBottom:"3px"}}>AI SCORE</div>
          <div style={{fontSize:"26px",fontWeight:"bold",color:BL}}>{aiT!==null?aiT:"—"}</div></>
        }/>
        <Crd s={{textAlign:"center",padding:"10px",borderColor:team.finalized?`${GR}50`:BD}} ch={
          <><div style={{fontSize:"9px",color:GR,letterSpacing:"1px",marginBottom:"3px"}}>FINAL</div>
          <div style={{fontSize:"26px",fontWeight:"bold",color:team.finalized?GR:TX}}>{fT||"—"}</div></>
        }/>
      </div>

      {/* Step 1: Manual */}
      <Crd ch={
        <><Lbl ch="① YOUR MANUAL SCORES"/>
        {CR.map(c =>
          <div key={c.key} style={{marginBottom:"10px"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:"3px"}}>
              <span style={{fontSize:"11px",color:c.color}}>{c.icon} {c.label}</span>
              <span style={{fontSize:"9px",color:DIM}}>weight {c.w}%</span>
            </div>
            <Sld val={team.manualScores[c.key]} onChange={v=>uM(c.key,v)} color={c.color} disabled={team.finalized}/>
          </div>
        )}
        <Btn v="outline" full ch="USE MANUAL AS FINAL →" onClick={()=>upd({finalScores:{...team.manualScores}})}/>
        </>
      }/>

      {/* Step 2: AI */}
      <Crd s={{borderColor:`${BL}30`}} ch={
        <><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
          <Lbl c={BL} ch="② AI SCORE — Compare"/>
          <Btn s={{padding:"6px 12px",fontSize:"10px",background:BL,color:"#000",border:`1px solid ${BL}`}}
            ch={team.aiScores?"↺ REFRESH AI":"✨ GET AI SCORE"}
            onClick={getAI} loading={al} disabled={team.finalized}/>
        </div>
        {!apiKey && <Info c={A} ch="🔑 Add Anthropic API key in Settings ⚙ to enable AI scoring."/>}
        <Err m={ae}/>
        {team.aiScores ? <>
          {team.aiAnalysis && <div style={{fontSize:"11px",color:"#93c5fd",padding:"8px",background:"#0a1020",borderRadius:"6px",marginBottom:"10px",lineHeight:"1.6"}}>{team.aiAnalysis}</div>}
          <div style={{background:"#090b12",borderRadius:"8px",padding:"10px",marginBottom:"10px"}}>
            <div style={{display:"grid",gridTemplateColumns:"auto 1fr 26px 26px",gap:"6px 8px",alignItems:"center"}}>
              <div/><div/>
              <span style={{fontSize:"8px",color:A,textAlign:"center"}}>YOU</span>
              <span style={{fontSize:"8px",color:BL,textAlign:"center"}}>AI</span>
              {CR.map(c => {
                const m = team.manualScores[c.key]||0;
                const a = team.aiScores[c.key]||0;
                const diff = +(a-m).toFixed(1);
                return [
                  <span key={c.key+"l"} style={{fontSize:"10px",color:c.color,whiteSpace:"nowrap"}}>{c.icon} {c.label}</span>,
                  <div key={c.key+"b"} style={{height:"6px",background:BD,borderRadius:"3px",position:"relative"}}>
                    <div style={{position:"absolute",left:0,width:`${m*10}%`,height:"100%",background:A,borderRadius:"3px",opacity:0.7}}/>
                    <div style={{position:"absolute",left:0,width:`${a*10}%`,height:"4px",top:"1px",background:BL,borderRadius:"3px",opacity:0.6}}/>
                  </div>,
                  <span key={c.key+"m"} style={{fontSize:"12px",fontWeight:"bold",color:A,textAlign:"center"}}>{m}</span>,
                  <div key={c.key+"a"} style={{textAlign:"center",position:"relative"}}>
                    <span style={{fontSize:"12px",fontWeight:"bold",color:BL}}>{a}</span>
                    {diff!==0 && <span style={{position:"absolute",top:"-8px",right:"-2px",fontSize:"8px",color:diff>0?GR:RD,fontWeight:"bold"}}>{diff>0?`+${diff}`:diff}</span>}
                  </div>
                ];
              })}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"6px"}}>
            <Btn v="outline" s={{width:"100%",fontSize:"10px",padding:"8px 4px"}} ch="USE AI"
              onClick={()=>upd({finalScores:{...team.aiScores}})}/>
            <Btn v="outline" s={{width:"100%",fontSize:"10px",padding:"8px 4px",borderColor:"#a78bfa",color:"#a78bfa"}} ch="AVERAGE"
              onClick={()=>{
                const avg={};
                CR.forEach(c=>{avg[c.key]=parseFloat(((team.manualScores[c.key]+(team.aiScores?.[c.key]||0))/2).toFixed(1));});
                upd({finalScores:avg});
              }}/>
            <Btn v="outline" s={{width:"100%",fontSize:"10px",padding:"8px 4px"}} ch="USE MINE"
              onClick={()=>upd({finalScores:{...team.manualScores}})}/>
          </div>
        </> : <div style={{color:DIM,fontSize:"11px",textAlign:"center",padding:"14px 0"}}>
          {apiKey?"Tap GET AI SCORE above":"Add API key in Settings ⚙"}
        </div>}
        </>
      }/>

      {/* Step 3: Final */}
      <Crd s={{borderColor:`${GR}40`}} ch={
        <><Lbl c={GR} ch="③ FINAL SCORE — Adjust then Lock"/>
        {team.aiScores && <div style={{fontSize:"10px",color:DIM,marginBottom:"10px"}}>
          Ref: <span style={{color:A}}>amber=manual</span> · <span style={{color:BL}}>blue=AI</span>
        </div>}
        {CR.map(c =>
          <div key={c.key} style={{marginBottom:"10px"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:"3px"}}>
              <span style={{fontSize:"11px",color:c.color}}>{c.icon} {c.label}</span>
              {team.aiScores && <span style={{fontSize:"9px",color:DIM}}>
                <span style={{color:A}}>{team.manualScores[c.key]}</span> · <span style={{color:BL}}>{team.aiScores[c.key]}</span>
              </span>}
            </div>
            <Sld val={fs[c.key]} onChange={v=>uF(c.key,v)} color={GR} disabled={team.finalized}/>
          </div>
        )}
        {!team.finalized
          ? <Btn v="green" full ch={`🔒 LOCK FINAL — ${fT||wt(fs)}/10`} s={{marginTop:"8px"}} onClick={()=>upd({finalized:true})}/>
          : <div style={{textAlign:"center",padding:"14px",background:"#0a1a0f",borderRadius:"8px",border:`1px solid ${GR}40`,marginTop:"8px"}}>
              <div style={{fontSize:"32px",fontWeight:"bold",color:GR,marginBottom:"4px"}}>{fT}/10</div>
              <div style={{fontSize:"11px",color:"#86efac",marginBottom:"10px"}}>✓ Score Finalized</div>
              <Btn v="outline" s={{borderColor:A,color:A}} ch="UNLOCK TO EDIT" onClick={()=>upd({finalized:false})}/>
            </div>
        }
        </>
      }/>
    </div>}
  </div>;
}

// ── Results ───────────────────────────────────────────────────────────────────
function Results({teams,set,apiKey,go}) {
  const [op,sOp] = useState(null);
  const ranked = [...teams].filter(t=>t.finalScores&&wt(t.finalScores)>0)
    .sort((a,b)=>wt(b.finalScores)-wt(a.finalScores));
  const pend = teams.filter(t=>!t.finalScores||wt(t.finalScores)===0);
  const MD = ["🥇","🥈","🥉"];
  const VC = {STRONG:GR, GOOD:A, AVERAGE:"#fb923c", WEAK:RD};

  return <div className="fi" style={{display:"flex",flexDirection:"column",gap:"12px"}}>
    {/* Stats */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"8px"}}>
      {[["TOTAL",teams.length,TX],["SCORED",ranked.length,A],["FINAL",teams.filter(t=>t.finalized).length,GR]].map(([l,n,c])=>
        <Crd key={l} s={{textAlign:"center",padding:"10px"}} ch={
          <><div style={{fontSize:"24px",fontWeight:"bold",color:c}}>{n}</div>
          <div style={{fontSize:"9px",color:DIM,letterSpacing:"1px"}}>{l}</div></>
        }/>
      )}
    </div>

    {/* Export buttons */}
    {teams.length>0 && <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
      <Btn v="outline" s={{width:"100%",borderColor:GR,color:GR,padding:"12px 8px"}}
        ch={<span style={{display:"block",textAlign:"center"}}>
          <div>📄 PDF REPORT</div>
          <div style={{fontSize:"9px",opacity:0.7}}>Print / Save</div>
        </span>}
        onClick={()=>xPDF(teams)}/>
      <Btn v="outline" s={{width:"100%",borderColor:BL,color:BL,padding:"12px 8px"}}
        ch={<span style={{display:"block",textAlign:"center"}}>
          <div>📊 CSV / EXCEL</div>
          <div style={{fontSize:"9px",opacity:0.7}}>Download</div>
        </span>}
        onClick={()=>xCSV(teams)}/>
    </div>}

    {/* Leaderboard */}
    {ranked.length>0 && <Crd ch={
      <><Lbl ch="🏆 LEADERBOARD"/>
      {ranked.map((t,i) => {
        const io = op===t.id;
        return <div key={t.id} style={{marginBottom:"6px"}}>
          <div onClick={()=>sOp(io?null:t.id)} style={{
            display:"flex",alignItems:"center",gap:"10px",padding:"10px",
            background:io?"#131a2e":"#090b12",
            borderRadius:io?"8px 8px 0 0":"8px",cursor:"pointer",
            border:`1px solid ${io?A+"40":BD}`
          }}>
            <span style={{fontSize:"20px",minWidth:"26px"}}>{MD[i]||`#${i+1}`}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:"bold",fontSize:"13px",color:TX}}>{t.name}</div>
              <div style={{fontSize:"10px",color:DIM}}>{t.cat.split("/")[0].trim()}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:"22px",fontWeight:"bold",color:i===0?A:TX}}>{wt(t.finalScores)}</div>
              <div style={{fontSize:"9px",color:DIM}}>/10</div>
            </div>
          </div>
          {io && <div style={{padding:"12px",background:"#0a0d15",borderRadius:"0 0 8px 8px",border:`1px solid ${BD}`,borderTop:"none"}}>
            {CR.map(c =>
              <div key={c.key} style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"7px"}}>
                <span style={{fontSize:"10px",color:c.color,width:"86px"}}>{c.icon} {c.label}</span>
                <div style={{flex:1,height:"6px",background:BD,borderRadius:"3px",position:"relative"}}>
                  <div style={{position:"absolute",left:0,width:`${(t.finalScores[c.key]||0)*10}%`,height:"100%",background:c.color,borderRadius:"3px"}}/>
                </div>
                <span style={{fontSize:"12px",color:c.color,fontWeight:"bold",width:"22px",textAlign:"right"}}>{t.finalScores[c.key]}</span>
                {t.aiScores && <span style={{fontSize:"9px",color:BL,width:"32px"}}>AI:{t.aiScores[c.key]}</span>}
              </div>
            )}
            {t.aiAnalysis && <div style={{fontSize:"11px",color:"#93c5fd",padding:"8px",background:"#0a1020",borderRadius:"6px",marginBottom:"8px",lineHeight:"1.6"}}>{t.aiAnalysis}</div>}
            {t.aiVerdict && <Pill c={VC[t.aiVerdict]||A} ch={t.aiVerdict}/>}
            <div style={{marginTop:"10px"}}>
              <Btn s={{padding:"6px 12px",fontSize:"10px"}} ch="EDIT SCORES" onClick={()=>go(t.id)}/>
            </div>
          </div>}
        </div>;
      })}
      </>
    }/>}

    {pend.length>0 && <Crd ch={
      <><Lbl c={DIM} ch={`PENDING (${pend.length})`}/>
      {pend.map(t =>
        <div key={t.id} onClick={()=>go(t.id)} style={{
          display:"flex",alignItems:"center",gap:"10px",padding:"8px",
          background:"#090b12",borderRadius:"6px",marginBottom:"6px",cursor:"pointer"
        }}>
          <span style={{color:DIM}}>○</span>
          <span style={{flex:1,fontSize:"13px",color:DIM}}>{t.name}</span>
          <Pill c={DIM} ch={t.visited?"VISITED":"NOT VISITED"}/>
        </div>
      )}</>
    }/>}

    {ranked.length===0 && pend.length===0 &&
      <div style={{textAlign:"center",color:DIM,padding:"40px 0"}}>Add teams and judge them to see results →</div>
    }
  </div>;
}

// ── Settings ──────────────────────────────────────────────────────────────────
function Settings({apiKey,onSave,teams,set}) {
  const [k,sK] = useState(apiKey||"");
  const [show,sShow] = useState(false);
  const [saved,sSaved] = useState(false);

  const save = () => { onSave(k.trim()); sSaved(true); setTimeout(()=>sSaved(false),1500); };

  return <div className="fi" style={{display:"flex",flexDirection:"column",gap:"12px"}}>
    <Info c={BL} ch={
      <div>
        <strong style={{color:TX}}>Q&A, Notes, Manual Scoring</strong> — fully offline, no key needed.<br/>
        <strong style={{color:TX}}>AI Scores</strong> — need Anthropic API key.<br/>
        💰 New accounts get <strong>$5 free</strong> — enough for a full expo day.<br/>
        🔗 <strong>console.anthropic.com</strong> → API Keys
      </div>
    }/>

    <Crd ch={
      <><Lbl ch="ANTHROPIC API KEY"/>
      <div style={{position:"relative",marginBottom:"10px"}}>
        <Fi type={show?"text":"password"} value={k} onChange={e=>sK(e.target.value)}
          placeholder="sk-ant-api03-..." s={{paddingRight:"44px"}}/>
        <button onClick={()=>sShow(s=>!s)} style={{
          position:"absolute",right:"10px",top:"50%",transform:"translateY(-50%)",
          background:"none",border:"none",color:DIM,cursor:"pointer",fontSize:"14px"
        }}>{show?"🙈":"👁️"}</button>
      </div>
      <div style={{fontSize:"9px",color:DIM,marginBottom:"10px"}}>Saved in localStorage — persists across sessions. Never shared.</div>
      <div style={{display:"flex",gap:"8px"}}>
        <Btn s={{flex:1}} ch={saved?"✓ SAVED!":"SAVE KEY"} onClick={save}/>
        {k && <Btn v="danger" ch="CLEAR" onClick={()=>{sK("");onSave("");}}/>}
      </div>
      {apiKey && <div style={{marginTop:"10px",padding:"8px",background:"#0a1a0f",borderRadius:"6px",border:`1px solid ${GR}30`,fontSize:"11px",color:GR}}>
        ✓ API key active — AI features enabled
      </div>}
      </>
    }/>

    <Crd ch={
      <><Lbl ch="📱 INSTALL AS PWA APP"/>
      <div style={{fontSize:"11px",color:DIM,lineHeight:"1.9"}}>
        <strong style={{color:TX}}>iPhone Safari: </strong>
        <span style={{color:A}}>Share ↑</span> → "Add to Home Screen" → Add<br/>
        <strong style={{color:TX}}>Android Chrome: </strong>
        <span style={{color:A}}>⋮</span> → "Add to Home screen" → Install<br/>
        <span style={{fontSize:"10px",color:"#475569"}}>⚖️ JudgePro · Full screen · Offline · Data persists</span>
      </div>
      </>
    }/>

    <Crd ch={
      <><Lbl ch="EXPORT DATA"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"8px"}}>
        <Btn v="outline" s={{width:"100%",borderColor:GR,color:GR}} ch="📄 PDF REPORT" onClick={()=>xPDF(teams)}/>
        <Btn v="outline" s={{width:"100%",borderColor:BL,color:BL}} ch="📊 CSV EXPORT" onClick={()=>xCSV(teams)}/>
      </div>
      <div style={{fontSize:"9px",color:DIM}}>PDF: Full scorecard · CSV: All data for Excel / Google Sheets</div>
      </>
    }/>

    <Crd ch={
      <><Lbl ch="DATA MANAGEMENT"/>
      <div style={{fontSize:"11px",color:DIM,marginBottom:"10px"}}>
        All data saved in localStorage — survives browser close and phone restarts. Only cleared here.
      </div>
      <Btn v="danger" full ch="🗑 CLEAR ALL TEAMS & SCORES"
        onClick={()=>{ if(window.confirm("Delete ALL data? Cannot be undone.")) set([]); }}/>
      </>
    }/>

    <Crd s={{background:"#0a0d15"}} ch={
      <><Lbl ch="ABOUT"/>
      <div style={{fontSize:"11px",color:DIM,lineHeight:"1.8"}}>
        <strong style={{color:TX}}>HackFusion Judge Pro v3.1</strong><br/>
        All-in-One Expert Judging Tool<br/>
        HACKFUSION 2026 — National Project Expo<br/>
        <span style={{color:A}}>Built with Claude AI · Anthropic</span>
      </div>
      </>
    }/>
  </div>;
}

// ── Root App ──────────────────────────────────────────────────────────────────
function App() {
  const [teams, setTmsRaw] = useState(() => LS.g("hfj_teams", []));
  const [screen, sSc] = useState("teams");
  const [aid, sAid] = useState(null);
  const [apiKey, sApiKey] = useState(() => {
    const k = LS.g("hfj_apikey",""); if(k) sKey(k); return k;
  });

  const setTeams = useCallback(fn => {
    setTmsRaw(prev => {
      const next = typeof fn==="function" ? fn(prev) : fn;
      LS.s("hfj_teams", next);
      return next;
    });
  }, []);

  const hKey = k => { sApiKey(k); sKey(k); LS.s("hfj_apikey",k); };
  const upd = useCallback((id,patch) =>
    setTeams(ts => ts.map(t => t.id===id ? {...t,...patch} : t))
  , [setTeams]);

  const at = aid ? teams.find(t=>t.id===aid) : null;
  const go = id => { sAid(id); sSc("judge"); };
  const v = teams.filter(t=>t.visited).length;
  const f = teams.filter(t=>t.finalized).length;

  const NAV = [
    {id:"teams",   i:"👥", l:"TEAMS"},
    {id:"judge",   i:"⚖️",  l:"JUDGE"},
    {id:"results", i:"🏆", l:"RESULTS"},
    {id:"settings",i:"⚙️",  l:"SETTINGS"}
  ];

  return <div style={{fontFamily:"'Courier New',monospace",background:BG,minHeight:"100vh",color:TX,maxWidth:"600px",margin:"0 auto"}}>
    {/* Header */}
    <div style={{
      background:"linear-gradient(135deg,#0d1117,#0a0f1e)",
      borderBottom:`1px solid ${A}25`, padding:"max(12px,env(safe-area-inset-top)) 16px 12px",
      display:"flex",justifyContent:"space-between",alignItems:"center",
      position:"sticky",top:0,zIndex:50
    }}>
      <div>
        <div style={{fontSize:"9px",color:A,letterSpacing:"3px"}}>◈ HACKFUSION 2026</div>
        <div style={{fontSize:"17px",fontWeight:"bold",color:"#fff"}}>
          {screen==="judge"&&at ? at.name : "Judge Pro ⚖️"}
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
        {teams.length>0 && <div style={{fontSize:"9px",textAlign:"right"}}>
          <div style={{color:A}}>{v}/{teams.length} visited</div>
          <div style={{color:GR}}>{f} final</div>
        </div>}
        <div style={{width:"8px",height:"8px",borderRadius:"50%",background:apiKey?GR:A,boxShadow:`0 0 6px ${apiKey?GR:A}`}}/>
      </div>
    </div>

    {/* Nav */}
    <div style={{display:"flex",background:CD,borderBottom:`1px solid ${BD}`,position:"sticky",top:"58px",zIndex:49}}>
      {NAV.map(n =>
        <button key={n.id} onClick={()=>{sSc(n.id);if(n.id!=="judge")sAid(null);}} style={{
          flex:1, padding:"10px 2px", border:"none", cursor:"pointer",
          background:screen===n.id?"#131a2e":"transparent",
          color:screen===n.id?A:DIM,
          fontFamily:"'Courier New',monospace", fontSize:"9px",
          fontWeight:screen===n.id?"bold":"normal",
          borderBottom:screen===n.id?`2px solid ${A}`:"2px solid transparent",
          transition:"all .2s"
        }}>
          <div style={{fontSize:"15px"}}>{n.i}</div>{n.l}
        </button>
      )}
    </div>

    {/* Content */}
    <div style={{padding:"14px 14px 100px"}}>
      {screen==="teams" && <Teams teams={teams} set={setTeams} go={go}/>}

      {screen==="judge" && (at
        ? <Judge team={at} upd={p=>upd(aid,p)} back={()=>{sSc("teams");sAid(null);}} apiKey={apiKey}/>
        : <div className="fi" style={{display:"flex",flexDirection:"column",gap:"10px"}}>
            <Info ch={<>Select a team from <strong style={{color:A}}>TEAMS</strong> and tap JUDGE.</>}/>
            {teams.map(t =>
              <Crd key={t.id} onClick={()=>go(t.id)} s={{cursor:"pointer",borderLeft:`3px solid ${t.finalized?GR:t.visited?A:BD}`}} ch={
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontWeight:"bold",color:TX}}>{t.name}</div>
                    <div style={{fontSize:"10px",color:DIM,marginTop:"2px"}}>{t.cat.split("/")[0].trim()}</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                    {t.finalized && <Pill c={GR} ch={`✓ ${wt(t.finalScores)}`}/>}
                    {t.visited && !t.finalized && <Pill c={A} ch="VISITED"/>}
                    <span style={{color:DIM,fontSize:"16px"}}>→</span>
                  </div>
                </div>
              }/>
            )}
            {teams.length===0 && <div style={{textAlign:"center",color:DIM,padding:"40px 0"}}>Add teams in TEAMS tab first →</div>}
          </div>
      )}

      {screen==="results" && <Results teams={teams} set={setTeams} apiKey={apiKey} go={go}/>}
      {screen==="settings" && <Settings apiKey={apiKey} onSave={hKey} teams={teams} set={setTeams}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
